<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pós-Venda</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #8E6AD8, #C4B5FD);
    display: flex;
    gap: 20px;
    padding: 20px;
}

/* Colunas */
.coluna {
    background: #fff;
    padding: 15px;
    width: 250px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* Cards */
.card {
    background: #f3f0ff;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
}

/* Inputs */
input {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* Botão principal chamativo */
.btn-adicionar {
    background: linear-gradient(135deg, #7C3AED, #A855F7);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 1px;
    box-shadow: 0 8px 20px rgba(124, 58, 237, 0.5);
    transition: all 0.3s ease;
    width: 100%;
}

.btn-adicionar:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 12px 25px rgba(124, 58, 237, 0.7);
}

.btn-adicionar:active {
    transform: scale(0.95);
}

/* Botões dos cards */
.card button {
    margin-top: 5px;
    width: 100%;
    border-radius: 20px;
    border: none;
    padding: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="coluna">
<h3>Novo Cliente</h3>
<input type="text" id="nome" placeholder="Nome"><br><br>
<input type="text" id="telefone" placeholder="Telefone"><br><br>

<button onclick="criarCard()" class="btn-adicionar">
    ✨ Adicionar
</button>
</div>

<div class="coluna" id="fase1">
<h3>Aguardando Contato</h3>
</div>

<div class="coluna" id="fase2">
<h3>Em Contato</h3>
</div>

<div class="coluna" id="fase3">
<h3>Finalizado</h3>
</div>

<script>
function criarCard() {
    let nome = document.getElementById("nome").value;
    let telefone = document.getElementById("telefone").value;

    if(nome === "") return;

    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <strong>${nome}</strong><br>
        ${telefone}<br><br>
        <textarea placeholder="Comentário" style="width:100%; border-radius:8px;"></textarea><br>
        <button onclick="mover(this, 'fase2')">Atender</button>
        <button onclick="mover(this, 'fase3')">Finalizar</button>
    `;

    document.getElementById("fase1").appendChild(card);

    document.getElementById("nome").value = "";
    document.getElementById("telefone").value = "";
}

function mover(botao, fase) {
    let card = botao.parentElement;
    document.getElementById(fase).appendChild(card);
}
</script>

</body>
</html>

</body>
</html>
