<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pós-Venda</title>

<style>
body {
    font-family: Arial;
    background-color: #8E6AD8;
    display: flex;
    gap: 20px;
    padding: 20px;
}

.coluna {
    background: #fff;
    padding: 10px;
    width: 250px;
    border-radius: 8px;
    box-shadow: 0 0 5px #ccc;
}

.card {
    background: #e9e9e9;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 6px;
}

button {
    margin-top: 5px;
    width: 100%;
}
</style>
</head>

<body>

    
<div class="coluna">
<h3>Novo Cliente</h3>
<input type="text" id="nome" placeholder="Nome"><br><br>
<input type="text" id="telefone" placeholder="Telefone"><br><br>
<button onclick="criarCard()">Adicionar</button>
</div> 

<div class="coluna" id="fase1">
<h3>Aguardando Contato</h3>
</div>

<div class="coluna" id="fase2">
<h3>Em Atendimento</h3>
</div>

<div class="coluna" id="fase3">
<h3>Finalizado</h3>
</div>

<script>
function criarCard() {
    let nome = document.getElementById("nome").value;
    let telefone = document.getElementById("telefone").value;

    if(nome === "") return;

    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <strong>${nome}</strong><br>
        ${telefone}<br><br>
        <textarea placeholder="Comentário"></textarea><br>
        <button onclick="mover(this, 'fase2')">Atender</button>
        <button onclick="mover(this, 'fase3')">Finalizar</button>
    `;

    document.getElementById("fase1").appendChild(card);

    document.getElementById("nome").value = "";
    document.getElementById("telefone").value = "";
}

function mover(botao, fase) {
    let card = botao.parentElement;
    document.getElementById(fase).appendChild(card);
}
</script>

</body>
</html>
