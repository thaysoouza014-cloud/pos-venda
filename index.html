<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pós-Venda Kanban PRO</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #7C3AED, #C4B5FD);
    margin: 0;
    padding: 20px;
}

.kanban {
    display: flex;
    gap: 20px;
    align-items: flex-start;
}

.coluna {
    background: #f9f9ff;
    width: 300px;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    max-height: 85vh;
}

.coluna h3 {
    text-align: center;
    margin: 0;
    background: linear-gradient(135deg, #7C3AED, #A855F7);
    color: white;
    padding: 10px;
    border-radius: 10px;
}

.contador {
    text-align: center;
    font-size: 14px;
    margin-top: 5px;
    font-weight: bold;
}

.card {
  width: 300px;
  padding: 20px;
  border-radius: 15px;
  background: white;
}

/* CARD */
.card {
  width: 300px;
  padding: 20px;
  border-radius: 15px;
  background: white;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  box-sizing: border-box;
  border-radius: 8px;
  border: 1px solid #ccc;
}
}

.btn-adicionar {
    background: linear-gradient(135deg, #7C3AED, #A855F7);
    color: white;
    border: none;
    padding: 12px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.btn-adicionar:hover {
    transform: scale(1.05);
}

.card button {
    margin-top: 5px;
    width: 100%;
    border: none;
    padding: 6px;
    border-radius: 20px;
    cursor: pointer;
}

.btn-excluir {
    background: #ff4d4d;
    color: white;
}
</style>
</head>

<body>

<div class="kanban">

<div class="coluna">
<h3>Novo Cliente</h3>
<input type="text" id="nome" placeholder="Nome">
<input type="text" id="telefone" placeholder="Telefone">
<button onclick="criarCard()" class="btn-adicionar">✨ Adicionar</button>
</div>

<div class="coluna">
<h3>Aguardando</h3>
<div class="contador" id="count-fase1">0 clientes</div>
<div class="cards" id="fase1"></div>
</div>

<div class="coluna">
<h3>Em Contato</h3>
<div class="contador" id="count-fase2">0 clientes</div>
<div class="cards" id="fase2"></div>
</div>

<div class="coluna">
<h3>Finalizado</h3>
<div class="contador" id="count-fase3">0 clientes</div>
<div class="cards" id="fase3"></div>
</div>

</div>

<script>
let dados = JSON.parse(localStorage.getItem("kanbanClientes")) || [];

function salvar() {
    localStorage.setItem("kanbanClientes", JSON.stringify(dados));
}

function atualizarContadores() {
    ["fase1","fase2","fase3"].forEach(fase => {
        let total = document.getElementById(fase).children.length;
        document.getElementById("count-"+fase).innerText = total + " clientes";
    });
}

function criarCard() {
    let nome = document.getElementById("nome").value;
    let telefone = document.getElementById("telefone").value;
    if(nome === "") return;

    let cliente = {
        id: Date.now(),
        nome,
        telefone,
        comentario: "",
        fase: "fase1"
    };

    dados.push(cliente);
    salvar();
    renderizar();
    document.getElementById("nome").value = "";
    document.getElementById("telefone").value = "";
}

function renderizar() {
    document.querySelectorAll(".cards").forEach(c => c.innerHTML = "");

    dados.forEach(cliente => {
        let card = document.createElement("div");
        card.className = "card";
        card.draggable = true;
        card.dataset.id = cliente.id;

        card.innerHTML = `
            <strong>${cliente.nome}</strong><br>
            ${cliente.telefone}<br>
            <textarea placeholder="Comentário">${cliente.comentario}</textarea>
            <button class="btn-excluir" onclick="excluir(${cliente.id})">🗑 Excluir</button>
        `;

        card.querySelector("textarea").addEventListener("input", e => {
            cliente.comentario = e.target.value;
            salvar();
        });

        card.addEventListener("dragstart", dragStart);

        document.getElementById(cliente.fase).appendChild(card);
    });

    atualizarContadores();
}

function excluir(id) {
    dados = dados.filter(c => c.id !== id);
    salvar();
    renderizar();
}

/* DRAG AND DROP */
function dragStart(e) {
    e.dataTransfer.setData("id", e.target.dataset.id);
}

document.querySelectorAll(".cards").forEach(coluna => {
    coluna.addEventListener("dragover", e => e.preventDefault());
    coluna.addEventListener("drop", e => {
        e.preventDefault();
        let id = e.dataTransfer.getData("id");
        let cliente = dados.find(c => c.id == id);
        cliente.fase = coluna.id;
        salvar();
        renderizar();
    });
});

renderizar();
</script>

</body>
</html>
